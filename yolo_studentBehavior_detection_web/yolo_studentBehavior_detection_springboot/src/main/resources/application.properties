spring.application.name=Kcsj
mybatis.mapper-locations=classpath:mappers/*xml
mybatis.type-aliases-package=com.example.Kcsj.mybatis.entity
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.name=defaultDataSource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/student_behavior?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
server.port=9999
file.ip=127.0.0.1
app.file.storage-dir=${APP_FILE_STORAGE_DIR:${user.dir}/files}
app.file.public-base-url=${APP_FILE_PUBLIC_BASE_URL:http://${file.ip}:${server.port}}
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# 为了在没有本地数据库的环境中也能启动文件上传等无数据库依赖的接口，临时禁用数据源与 MyBatis 的自动配置。
# 如需启用数据库功能，请删除或注释掉以下行，并确保数据库可用。
## 开启数据库模式：放开自动装配（如需无数据库模式，可恢复此行）
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.mybatis.spring.boot.autoconfigure.MybatisAutoConfiguration

# 数据库相关功能开关：false 时不加载任何依赖数据库的 Bean（控制器、MyBatis 配置等）
# 若要启用数据库相关接口，请改为 true，并同时去掉上面的 spring.autoconfigure.exclude 配置。
app.db.enabled=true

# Flask upstream configuration
app.flask.base-url=${APP_FLASK_BASE_URL:http://127.0.0.1:5000}
app.flask.predict-path=${APP_FLASK_PREDICT_PATH:/predictImg}
app.flask.file-names-path=${APP_FLASK_FILE_NAMES_PATH:/file_names}

# Optional schema optimization switch (manual by default)
app.db.optimize-schema.enabled=${APP_DB_OPTIMIZE_SCHEMA_ENABLED:false}

# Auth configuration
app.auth.secret=${APP_AUTH_SECRET:replace-this-in-production}
app.auth.token-ttl-ms=${APP_AUTH_TOKEN_TTL_MS:604800000}




